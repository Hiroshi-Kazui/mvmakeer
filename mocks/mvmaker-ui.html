<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MV Maker — UIモック</title>
<style>
  :root {
    --bg-0: #0d0e14;
    --bg-1: #14161f;
    --bg-2: #1b1e2b;
    --bg-3: #232738;
    --line: #2c3044;
    --text-0: #eef0f8;
    --text-1: #9aa0b8;
    --text-2: #5c6280;
    --accent: #7c5cff;
    --accent-soft: #7c5cff33;
    --accent-2: #4f8dff;
    --green: #3ecf8e;
    --amber: #ffb84d;
    --danger: #ff5c7a;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg-0);
    color: var(--text-0);
    font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
    font-size: 13px;
    overflow: hidden;
    user-select: none;
  }

  /* ============ layout ============ */
  .app { display: grid; grid-template-rows: 48px 1fr 26px; height: 100vh; }
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 0 16px; background: var(--bg-1); border-bottom: 1px solid var(--line);
  }
  header .logo { font-weight: 700; font-size: 14px; letter-spacing: .04em; }
  header .logo span { color: var(--accent); }
  header .project {
    display: flex; align-items: center; gap: 6px; color: var(--text-1);
    padding: 4px 10px; border-radius: 6px; cursor: text;
  }
  header .project:hover { background: var(--bg-2); }
  header .spacer { flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-3); color: var(--text-0);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 14px; font-size: 12.5px; cursor: pointer; font-family: inherit;
    transition: background .15s, border-color .15s, opacity .15s;
  }
  .btn:hover { background: #2b3048; }
  .btn.primary { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { background: #8d70ff; }
  .btn.big { padding: 10px 0; width: 100%; justify-content: center; font-size: 13px; }
  .btn:disabled { opacity: .35; cursor: default; }
  .btn:disabled:hover { background: var(--bg-3); }
  .btn.primary:disabled:hover { background: var(--accent); }
  kbd {
    background: #00000055; border: 1px solid var(--line); border-bottom-width: 2px;
    border-radius: 4px; padding: 0 5px; font-size: 10.5px; font-family: inherit; color: var(--text-1);
  }

  main { display: grid; grid-template-columns: 250px 1fr 280px; min-height: 0; }
  .panel { background: var(--bg-1); overflow-y: auto; min-height: 0; }
  .panel.left  { border-right: 1px solid var(--line); }
  .panel.right { border-left: 1px solid var(--line); }
  .panel::-webkit-scrollbar { width: 8px; }
  .panel::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }

  .sec { padding: 14px 14px 6px; }
  .sec + .sec { border-top: 1px solid var(--line); margin-top: 8px; }
  .sec h2 {
    font-size: 11px; font-weight: 600; color: var(--text-2);
    letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sec h2 .mini {
    font-size: 10.5px; color: var(--accent); cursor: pointer; letter-spacing: 0;
    text-transform: none; font-weight: 500;
  }
  .sec h2 .mini:hover { text-decoration: underline; }

  /* ============ left: materials ============ */
  .thumb-item {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-2); border: 1px solid transparent; border-radius: 8px;
    padding: 6px 8px; margin-bottom: 6px; cursor: grab;
  }
  .thumb-item:hover { border-color: var(--line); }
  .thumb-item .thumb {
    width: 52px; height: 32px; border-radius: 5px; flex-shrink: 0;
  }
  .thumb-item .meta { flex: 1; min-width: 0; }
  .thumb-item .name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .thumb-item .sub { font-size: 10.5px; color: var(--text-2); margin-top: 1px; }
  .thumb-item .grip { color: var(--text-2); font-size: 14px; letter-spacing: -2px; }

  .audio-item {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #2a2450, #1b1e2b);
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; margin-bottom: 6px;
  }
  .audio-item .icon {
    width: 30px; height: 30px; border-radius: 6px; background: var(--accent-soft);
    display: grid; place-items: center; font-size: 14px;
  }

  /* ============ left: lyric queue ============ */
  .lyric-list { margin-bottom: 8px; }
  .lyric-line {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 9px; border-radius: 7px; margin-bottom: 3px;
    color: var(--text-1); font-size: 12.5px; border: 1px solid transparent;
  }
  .lyric-line .no { font-size: 10px; color: var(--text-2); width: 16px; text-align: right; flex-shrink: 0; }
  .lyric-line.done { color: var(--text-2); text-decoration: line-through; text-decoration-color: #ffffff30; }
  .lyric-line.next {
    background: var(--accent-soft); border-color: var(--accent);
    color: var(--text-0); font-weight: 600;
  }
  .lyric-line.next .no { color: var(--accent); }
  .lyric-hint { font-size: 11px; color: var(--text-2); line-height: 1.6; padding: 2px 4px 10px; }
  .lyric-hint kbd { font-size: 10px; }

  /* ============ center ============ */
  .center { display: grid; grid-template-rows: auto auto auto 1fr; min-width: 0; min-height: 0; background: var(--bg-0); }

  .preview-wrap { padding: 14px 18px 0; display: grid; place-items: center; }
  .preview {
    position: relative; width: 100%; max-width: 760px; aspect-ratio: 16/9;
    border-radius: var(--radius); overflow: hidden; background: #000;
    box-shadow: 0 8px 40px #00000080; outline: 1px solid var(--line);
  }
  .slide {
    position: absolute; inset: 0; opacity: 0; transition: opacity .6s;
    display: grid; place-items: end start;
  }
  .slide.on { opacity: 1; }
  .slide .tag {
    margin: 0 0 10px 12px; font-size: 10px; color: #ffffff88;
    background: #00000066; padding: 2px 8px; border-radius: 20px;
  }
  .telop-layer {
    position: absolute; inset: 0; display: grid; place-items: center;
    pointer-events: none; padding: 0 40px;
  }
  .telop-text {
    font-size: clamp(20px, 4.2vw, 40px); font-weight: 600; text-align: center;
    color: #fff; line-height: 1.5; letter-spacing: .06em;
    text-shadow: 0 2px 14px #000000cc, 0 0 3px #000;
    font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    white-space: pre-line;
  }
  .active-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--accent); color: #fff; font-size: 10.5px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px; opacity: 0; transition: opacity .2s;
  }
  .active-badge.on { opacity: 1; }
  .rec-indicator {
    position: absolute; top: 10px; right: 10px; display: none;
    align-items: center; gap: 6px; background: #00000066; padding: 3px 10px;
    border-radius: 20px; font-size: 10.5px; color: #ffdddd;
  }
  .rec-indicator.on { display: inline-flex; }
  .rec-indicator .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .25; } }

  /* transport */
  .transport {
    display: flex; align-items: center; gap: 14px;
    padding: 10px 18px 4px; max-width: 796px; margin: 0 auto; width: 100%;
  }
  .tbtn {
    background: none; border: none; color: var(--text-0); font-size: 17px;
    cursor: pointer; padding: 6px 8px; border-radius: 7px; font-family: inherit;
  }
  .tbtn:hover { background: var(--bg-2); }
  .tbtn.play {
    background: var(--bg-3); width: 42px; height: 42px; border-radius: 50%;
    display: grid; place-items: center; font-size: 15px; border: 1px solid var(--line);
  }
  .tbtn.play:hover { background: var(--accent); border-color: var(--accent); }
  .timecode { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--text-1); }
  .timecode b { color: var(--text-0); font-weight: 600; }
  .seek { flex: 1; height: 22px; display: flex; align-items: center; cursor: pointer; }
  .seek .rail { position: relative; width: 100%; height: 4px; border-radius: 2px; background: var(--bg-3); }
  .seek .fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 2px; background: linear-gradient(90deg, var(--accent-2), var(--accent)); }
  .seek .knob {
    position: absolute; top: 50%; transform: translate(-50%, -50%);
    width: 12px; height: 12px; border-radius: 50%; background: #fff; box-shadow: 0 1px 6px #0009;
  }

  /* action bar */
  .actions {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 18px 12px; max-width: 796px; margin: 0 auto; width: 100%;
  }
  .actions .gap { flex: 1; }
  .abtn {
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: 9px; padding: 9px 16px; font-size: 13px; cursor: pointer;
    border: 1px solid var(--line); background: var(--bg-2); color: var(--text-0); font-family: inherit;
    transition: all .15s;
  }
  .abtn:hover { border-color: var(--text-2); }
  .abtn.insert { background: var(--accent); border-color: var(--accent); font-weight: 700; }
  .abtn.insert:hover { background: #8d70ff; box-shadow: 0 2px 16px var(--accent-soft); }
  .abtn.fadeout:not(:disabled) { border-color: var(--amber); color: var(--amber); }
  .abtn.fadeout:not(:disabled):hover { background: #ffb84d1a; }
  .abtn.danger:not(:disabled):hover { border-color: var(--danger); color: var(--danger); }
  .abtn:disabled { opacity: .35; cursor: default; }

  /* ============ timeline ============ */
  .timeline {
    border-top: 1px solid var(--line); background: var(--bg-1);
    display: grid; grid-template-rows: 26px 1fr; min-height: 0; overflow: hidden;
  }
  .ruler { position: relative; border-bottom: 1px solid var(--line); cursor: pointer; margin-left: 90px; }
  .ruler .tick { position: absolute; top: 0; bottom: 0; border-left: 1px solid var(--line); padding: 4px 0 0 5px; font-size: 10px; color: var(--text-2); font-variant-numeric: tabular-nums; }
  .lanes { position: relative; overflow-y: auto; }
  .lane { display: flex; height: 40px; border-bottom: 1px solid #20233255; }
  .lane .label {
    width: 90px; flex-shrink: 0; display: flex; align-items: center; padding: 0 10px;
    font-size: 11px; color: var(--text-2); background: var(--bg-1);
    border-right: 1px solid var(--line); position: sticky; left: 0; z-index: 3;
  }
  .lane .track { position: relative; flex: 1; }
  .lane.audio { height: 46px; background: #12141c; }

  .clip {
    position: absolute; top: 6px; bottom: 6px; border-radius: 6px;
    background: #3a3466; border: 1px solid #55509a; cursor: grab;
    display: flex; align-items: center; overflow: hidden; z-index: 2;
    font-size: 11.5px; color: #dcd8ff;
  }
  .clip .body { flex: 1; padding: 0 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
  .clip.active { background: var(--accent); border-color: #b0a0ff; color: #fff; box-shadow: 0 0 14px var(--accent-soft); z-index: 4; }
  .clip .h {
    position: absolute; top: 0; bottom: 0; width: 9px; cursor: ew-resize; z-index: 5;
    display: grid; place-items: center;
  }
  .clip .h::after {
    content: ""; width: 3px; height: 55%; border-radius: 2px; background: #ffffff55;
  }
  .clip .h:hover::after { background: #fff; }
  .clip .h.in { left: 0; }
  .clip .h.end { right: 0; }
  .clip .h.fo {
    width: 14px; cursor: ew-resize;
  }
  .clip .h.fo::after {
    content: "O"; width: auto; height: auto; background: none;
    font-size: 9px; font-weight: 700; color: #14161f;
    background: var(--amber); border-radius: 3px; padding: 1px 3px;
  }
  .clip .fadezone {
    position: absolute; top: 0; bottom: 0; right: 0; pointer-events: none;
    background: repeating-linear-gradient(-45deg, #ffb84d22 0 4px, transparent 4px 8px);
    border-left: 1px dashed #ffb84d88;
  }
  .img-clip {
    position: absolute; top: 7px; bottom: 7px; border-radius: 5px;
    border: 1px solid #ffffff22; font-size: 10px; color: #fff9;
    display: flex; align-items: end; padding: 3px 6px; pointer-events: none;
  }
  .wave { position: absolute; inset: 6px 0; opacity: .75; }
  .playhead {
    position: absolute; top: 0; bottom: 0; width: 1px; background: var(--accent-2);
    z-index: 6; pointer-events: none; margin-left: 90px;
  }
  .playhead::before {
    content: attr(data-t); position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
    background: var(--accent-2); color: #fff; font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 4px; white-space: nowrap; font-variant-numeric: tabular-nums;
  }
  .lanes-scroll { position: relative; }

  /* ============ right: inspector ============ */
  .inspector-empty { padding: 30px 18px; color: var(--text-2); font-size: 12px; text-align: center; line-height: 1.8; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--text-1); margin-bottom: 5px; }
  textarea.txt, select.txt, input.txt {
    width: 100%; background: var(--bg-2); border: 1px solid var(--line); border-radius: 7px;
    color: var(--text-0); font-family: inherit; font-size: 13px; padding: 8px 10px; resize: none;
  }
  textarea.txt:focus, input.txt:focus { outline: none; border-color: var(--accent); }
  .row { display: flex; gap: 8px; }
  .row .field { flex: 1; }
  .pos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    width: 96px; background: var(--bg-2); padding: 4px; border-radius: 7px; border: 1px solid var(--line);
  }
  .pos-grid button {
    aspect-ratio: 1.6; border: none; border-radius: 3px; background: var(--bg-3); cursor: pointer;
  }
  .pos-grid button.on { background: var(--accent); }
  .stepper { display: flex; align-items: center; gap: 6px; }
  .stepper .val {
    flex: 1; background: var(--bg-2); border: 1px solid var(--line); border-radius: 7px;
    padding: 7px 10px; font-variant-numeric: tabular-nums; font-size: 13px; text-align: center;
  }
  .stepper .val.hl { border-color: var(--amber); color: var(--amber); }
  .stepper button {
    width: 26px; height: 30px; border-radius: 6px; border: 1px solid var(--line);
    background: var(--bg-3); color: var(--text-0); cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .stepper button:hover { background: var(--accent); border-color: var(--accent); }
  .swatch-row { display: flex; gap: 6px; }
  .swatch { width: 26px; height: 26px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; }
  .swatch.on { border-color: var(--accent); }

  /* ============ footer ============ */
  footer {
    display: flex; align-items: center; gap: 18px; padding: 0 16px;
    background: var(--bg-1); border-top: 1px solid var(--line);
    font-size: 11px; color: var(--text-2);
  }
  footer .k { display: inline-flex; align-items: center; gap: 5px; }
  footer .spacer { flex: 1; }

  .toast {
    position: fixed; bottom: 46px; left: 50%; transform: translateX(-50%) translateY(10px);
    background: var(--bg-3); border: 1px solid var(--line); color: var(--text-0);
    padding: 9px 18px; border-radius: 10px; font-size: 12.5px; opacity: 0;
    transition: all .25s; pointer-events: none; box-shadow: 0 6px 24px #000a; z-index: 99;
  }
  .toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- ================= header ================= -->
  <header>
    <div class="logo">MV<span>Maker</span></div>
    <div class="project">プロジェクト名: <b style="color:var(--text-0)">My Music Video</b> ✎</div>
    <div class="spacer"></div>
    <button class="btn">プロジェクトを保存</button>
    <button class="btn primary">⬇ 書き出し (MP4)</button>
  </header>

  <main>
    <!-- ================= left panel ================= -->
    <aside class="panel left">
      <div class="sec">
        <h2>1. 素材 <span class="mini">+ 画像を追加</span></h2>
        <div id="imgList"></div>
        <div class="audio-item">
          <div class="icon">♪</div>
          <div class="meta" style="flex:1">
            <div class="name">song.mp3</div>
            <div class="sub" style="font-size:10.5px;color:var(--text-2)">03:45 / 320kbps</div>
          </div>
        </div>
        <button class="btn big" style="margin:6px 0 10px">▶ スライドショー動画を生成</button>
      </div>

      <div class="sec">
        <h2>2. 歌詞キュー <span class="mini">✎ 歌詞を編集</span></h2>
        <div class="lyric-hint">
          曲を再生しながら <kbd>I</kbd> を押すたびに、次の行がその位置に挿入されます。
        </div>
        <div class="lyric-list" id="lyricList"></div>
      </div>
    </aside>

    <!-- ================= center ================= -->
    <section class="center">
      <div class="preview-wrap">
        <div class="preview" id="preview">
          <div class="telop-layer"><div class="telop-text" id="telopText"></div></div>
          <div class="active-badge" id="activeBadge">アクティブ</div>
          <div class="rec-indicator" id="recInd"><span class="dot"></span>打ち込み中</div>
        </div>
      </div>

      <div class="transport">
        <button class="tbtn" id="btnPrev" title="先頭へ">⏮</button>
        <button class="tbtn play" id="btnPlay">▶</button>
        <button class="tbtn" id="btnNext" title="末尾へ">⏭</button>
        <div class="timecode"><b id="tcCur">00:00.0</b> / <span id="tcDur">03:45.0</span></div>
        <div class="seek" id="seek">
          <div class="rail">
            <div class="fill" id="seekFill" style="width:0%"></div>
            <div class="knob" id="seekKnob" style="left:0%"></div>
          </div>
        </div>
        <button class="tbtn" title="音量">🔊</button>
      </div>

      <div class="actions">
        <button class="abtn insert" id="btnInsert">Ｔ テロップを挿入 <kbd style="color:#fff;border-color:#ffffff55">I</kbd></button>
        <button class="abtn fadeout" id="btnFadeOut" disabled>◐ ここでフェードアウト <kbd>O</kbd></button>
        <div class="gap"></div>
        <button class="abtn danger" id="btnDelete" disabled>🗑 削除</button>
      </div>

      <div class="timeline">
        <div style="position:relative; overflow:hidden;">
          <div class="ruler" id="ruler"></div>
        </div>
        <div class="lanes-scroll">
          <div class="lanes" id="lanes"></div>
          <div class="playhead" id="playhead" data-t="00:00.0"></div>
        </div>
      </div>
    </section>

    <!-- ================= right panel ================= -->
    <aside class="panel right" id="inspector">
      <div class="inspector-empty" id="inspEmpty">
        テロップを選択すると<br>ここで編集できます
      </div>
      <div id="inspBody" style="display:none">
        <div class="sec">
          <h2>テロップ編集</h2>
          <div class="field">
            <label>テキスト</label>
            <textarea class="txt" id="inspText" rows="3"></textarea>
          </div>
          <div class="row">
            <div class="field">
              <label>フォント</label>
              <select class="txt"><option>游明朝</option><option>游ゴシック</option><option>Noto Sans JP</option></select>
            </div>
            <div class="field" style="max-width:80px">
              <label>サイズ</label>
              <input class="txt" value="72">
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>位置</label>
              <div class="pos-grid" id="posGrid"></div>
            </div>
            <div class="field">
              <label>色</label>
              <div class="swatch-row">
                <div class="swatch on" style="background:#fff"></div>
                <div class="swatch" style="background:#ffe27a"></div>
                <div class="swatch" style="background:#8fd0ff"></div>
                <div class="swatch" style="background:#ff9db5"></div>
              </div>
            </div>
          </div>
        </div>
        <div class="sec">
          <h2>タイミング</h2>
          <div class="field">
            <label>表示開始(フェードイン)</label>
            <div class="stepper" data-key="tIn">
              <button data-d="-0.1">−</button><div class="val"></div><button data-d="0.1">＋</button>
            </div>
          </div>
          <div class="field">
            <label>フェードアウト開始 <span style="color:var(--amber)">O</span></label>
            <div class="stepper" data-key="tFo">
              <button data-d="-0.1">−</button><div class="val hl"></div><button data-d="0.1">＋</button>
            </div>
          </div>
          <div class="field">
            <label>テロップ終了</label>
            <div class="stepper" data-key="tEnd">
              <button data-d="-0.1">−</button><div class="val"></div><button data-d="0.1">＋</button>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>フェードイン時間</label>
              <input class="txt" value="0.5 秒">
            </div>
            <div class="field">
              <label>フェードアウト時間</label>
              <input class="txt" value="0.8 秒">
            </div>
          </div>
          <button class="btn big" style="margin-bottom:14px">▶ このテロップの前後を再生して確認</button>
        </div>
      </div>
    </aside>
  </main>

  <!-- ================= footer ================= -->
  <footer>
    <span class="k"><kbd>Space</kbd> 再生 / 停止</span>
    <span class="k"><kbd>I</kbd> テロップ挿入</span>
    <span class="k"><kbd>O</kbd> フェードアウト</span>
    <span class="k"><kbd>←</kbd><kbd>→</kbd> 1秒シーク</span>
    <span class="k"><kbd>Del</kbd> 削除</span>
    <div class="spacer"></div>
    <span id="statusMsg">タイムライン上のブロックはドラッグで移動、両端と O マーカーはドラッグで調整できます</span>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   MV Maker — interactive UI mock (no real media, all simulated)
   ============================================================ */
const DUR = 225; // 3:45
const state = {
  t: 0,
  playing: false,
  telops: [],   // {id, text, tIn, tFo, tEnd, lane}
  activeId: null,
  nextLyric: 0,
  seq: 0,
};

const LYRICS = [
  "朝焼けの向こうで",
  "君の声が聞こえた",
  "この景色が\n心をつなぐ",
  "遠く離れていても",
  "同じ空を見てる",
  "未来を照らす光",
];

const IMAGES = [
  { name: "img_001.jpg", grad: "linear-gradient(135deg,#f6a06a,#c85a8e,#5d3a8e)" },
  { name: "img_002.jpg", grad: "linear-gradient(135deg,#7ec8a9,#3f8ec4,#28406e)" },
  { name: "img_003.jpg", grad: "linear-gradient(135deg,#f9d976,#f39f6b,#a34a6e)" },
  { name: "img_004.jpg", grad: "linear-gradient(135deg,#9ad0ec,#7c8ce0,#4a3f8e)" },
  { name: "img_005.jpg", grad: "linear-gradient(135deg,#e8a2b8,#9a6ec8,#3a2a6e)" },
];
const IMG_DUR = DUR / IMAGES.length;

/* --------- helpers --------- */
const $ = id => document.getElementById(id);
const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
function fmt(t) {
  const m = Math.floor(t / 60), s = Math.floor(t % 60), d = Math.floor((t % 1) * 10);
  return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0") + "." + d;
}
function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("on");
  clearTimeout(el._tm);
  el._tm = setTimeout(() => el.classList.remove("on"), 1800);
}

/* --------- build static pieces --------- */
// image list (left)
$("imgList").innerHTML = IMAGES.map(im => `
  <div class="thumb-item">
    <div class="thumb" style="background:${im.grad}"></div>
    <div class="meta"><div class="name">${im.name}</div><div class="sub">${IMG_DUR.toFixed(0)} 秒</div></div>
    <div class="grip">⋮⋮</div>
  </div>`).join("");

// preview slides
const preview = $("preview");
IMAGES.forEach((im, i) => {
  const d = document.createElement("div");
  d.className = "slide";
  d.style.background = im.grad;
  d.innerHTML = `<div class="tag">${im.name}</div>`;
  preview.insertBefore(d, preview.firstChild);
});
const slides = [...preview.querySelectorAll(".slide")];

// ruler ticks
const ruler = $("ruler");
for (let s = 0; s <= DUR; s += 15) {
  const tick = document.createElement("div");
  tick.className = "tick";
  tick.style.left = (s / DUR * 100) + "%";
  if (s % 30 === 0) tick.textContent = fmt(s).slice(0, 5);
  ruler.appendChild(tick);
}

// position grid (inspector)
const posGrid = $("posGrid");
for (let i = 0; i < 9; i++) {
  const b = document.createElement("button");
  if (i === 4) b.classList.add("on");
  b.onclick = () => { posGrid.querySelectorAll("button").forEach(x => x.classList.remove("on")); b.classList.add("on"); };
  posGrid.appendChild(b);
}

/* --------- lyric queue --------- */
function renderLyrics() {
  $("lyricList").innerHTML = LYRICS.map((l, i) => {
    const cls = i < state.nextLyric ? "done" : i === state.nextLyric ? "next" : "";
    return `<div class="lyric-line ${cls}"><span class="no">${i + 1}</span><span>${l.replace("\n", " / ")}</span></div>`;
  }).join("");
}

/* --------- timeline lanes --------- */
function assignLanes() {
  // greedy lane packing so overlapping telops stack instead of one-row-each
  const sorted = [...state.telops].sort((a, b) => a.tIn - b.tIn);
  const laneEnds = [];
  for (const tp of sorted) {
    let lane = laneEnds.findIndex(end => end <= tp.tIn + 0.01);
    if (lane === -1) { lane = laneEnds.length; laneEnds.push(0); }
    laneEnds[lane] = tp.tEnd;
    tp.lane = lane;
  }
  return Math.max(1, laneEnds.length);
}

function renderTimeline() {
  const nLanes = assignLanes();
  const lanes = $("lanes");
  let html = "";
  for (let li = 0; li < nLanes; li++) {
    const clips = state.telops.filter(tp => tp.lane === li).map(tp => {
      const l = tp.tIn / DUR * 100, w = (tp.tEnd - tp.tIn) / DUR * 100;
      const foPct = clamp((tp.tFo - tp.tIn) / (tp.tEnd - tp.tIn) * 100, 0, 100);
      return `<div class="clip ${tp.id === state.activeId ? "active" : ""}" data-id="${tp.id}"
                   style="left:${l}%;width:${w}%">
        <div class="h in" data-h="in"></div>
        <div class="body">${tp.text.replace("\n", " ")}</div>
        <div class="fadezone" style="width:${100 - foPct}%"></div>
        <div class="h fo" data-h="fo" style="left:calc(${foPct}% - 7px)"></div>
        <div class="h end" data-h="end"></div>
      </div>`;
    }).join("");
    html += `<div class="lane"><div class="label">テロップ ${li + 1}</div><div class="track">${clips}</div></div>`;
  }
  // image track
  const imgClips = IMAGES.map((im, i) =>
    `<div class="img-clip" style="left:${i * IMG_DUR / DUR * 100}%;width:${IMG_DUR / DUR * 100}%;background:${im.grad}">${im.name}</div>`
  ).join("");
  html += `<div class="lane"><div class="label">画像</div><div class="track">${imgClips}</div></div>`;
  // audio track
  html += `<div class="lane audio"><div class="label">♪ song.mp3</div><div class="track">${waveSVG()}</div></div>`;
  lanes.innerHTML = html;
}

let _waveCache = null;
function waveSVG() {
  if (_waveCache) return _waveCache;
  let bars = "";
  let seed = 7;
  const rnd = () => (seed = (seed * 16807) % 2147483647) / 2147483647;
  for (let i = 0; i < 300; i++) {
    const h = 12 + rnd() * 76 * (0.4 + 0.6 * Math.abs(Math.sin(i / 14)));
    bars += `<rect x="${i / 3}%" y="${(100 - h) / 2}%" width="0.22%" height="${h}%" rx="0.4" fill="#6a5fd4"/>`;
  }
  _waveCache = `<svg class="wave" width="100%" height="100%" preserveAspectRatio="none">${bars}</svg>`;
  return _waveCache;
}

/* --------- inspector --------- */
function renderInspector() {
  const tp = state.telops.find(x => x.id === state.activeId);
  $("inspEmpty").style.display = tp ? "none" : "block";
  $("inspBody").style.display = tp ? "block" : "none";
  $("btnFadeOut").disabled = !tp;
  $("btnDelete").disabled = !tp;
  $("activeBadge").classList.toggle("on", !!tp);
  if (!tp) return;
  if (document.activeElement !== $("inspText")) $("inspText").value = tp.text;
  document.querySelectorAll(".stepper").forEach(st => {
    st.querySelector(".val").textContent = fmt(tp[st.dataset.key]);
  });
}
$("inspText").addEventListener("input", e => {
  const tp = state.telops.find(x => x.id === state.activeId);
  if (tp) { tp.text = e.target.value; renderTimeline(); bindClips(); renderFrame(); }
});
document.querySelectorAll(".stepper button").forEach(b => {
  b.onclick = () => {
    const tp = state.telops.find(x => x.id === state.activeId);
    if (!tp) return;
    const key = b.closest(".stepper").dataset.key;
    tp[key] = clamp(tp[key] + parseFloat(b.dataset.d), 0, DUR);
    normalizeTelop(tp);
    renderAll();
  };
});
function normalizeTelop(tp) {
  tp.tEnd = Math.max(tp.tEnd, tp.tIn + 0.5);
  tp.tFo = clamp(tp.tFo, tp.tIn, tp.tEnd);
}

/* --------- core actions --------- */
function insertTelop() {
  const text = LYRICS[state.nextLyric] ?? `テロップ ${state.seq + 1}`;
  if (state.nextLyric < LYRICS.length) state.nextLyric++;
  const tp = {
    id: ++state.seq, text,
    tIn: state.t,
    tFo: Math.min(state.t + 4.2, DUR),
    tEnd: Math.min(state.t + 5, DUR),
  };
  state.telops.push(tp);
  state.activeId = tp.id;
  toast(`テロップを挿入: ${fmt(state.t)} 「${text.replace("\n", " ")}」`);
  renderAll();
}
function setFadeOutHere() {
  const tp = state.telops.find(x => x.id === state.activeId);
  if (!tp) return;
  tp.tFo = clamp(state.t, tp.tIn, DUR);
  tp.tEnd = Math.min(tp.tFo + 0.8, DUR);
  toast(`フェードアウト開始を設定: ${fmt(tp.tFo)}`);
  renderAll();
}
function deleteActive() {
  const i = state.telops.findIndex(x => x.id === state.activeId);
  if (i === -1) return;
  toast(`削除: 「${state.telops[i].text.replace("\n", " ")}」`);
  state.telops.splice(i, 1);
  state.activeId = null;
  renderAll();
}

/* --------- playback --------- */
let lastTick = null;
function loop(ts) {
  if (state.playing) {
    if (lastTick != null) {
      state.t += (ts - lastTick) / 1000;
      if (state.t >= DUR) { state.t = DUR; setPlaying(false); }
    }
    renderFrame();
  }
  lastTick = ts;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function setPlaying(p) {
  state.playing = p;
  $("btnPlay").textContent = p ? "❚❚" : "▶";
  $("recInd").classList.toggle("on", p);
}

function telopOpacity(tp, t) {
  const FI = 0.5;
  if (t < tp.tIn || t > tp.tEnd) return 0;
  if (t < tp.tIn + FI) return (t - tp.tIn) / FI;
  if (t > tp.tFo) return Math.max(0, 1 - (t - tp.tFo) / Math.max(0.01, tp.tEnd - tp.tFo));
  return 1;
}

function renderFrame() {
  const t = state.t;
  // slides
  const idx = clamp(Math.floor(t / IMG_DUR), 0, IMAGES.length - 1);
  slides.forEach((s, i) => s.classList.toggle("on", i === idx));
  // telop overlay: show the most recently started visible telop
  let best = null;
  for (const tp of state.telops) {
    if (telopOpacity(tp, t) > 0 && (!best || tp.tIn > best.tIn)) best = tp;
  }
  const tt = $("telopText");
  if (best) { tt.textContent = best.text; tt.style.opacity = telopOpacity(best, t); }
  else tt.style.opacity = 0;
  // transport / playhead
  $("tcCur").textContent = fmt(t);
  const pct = t / DUR * 100;
  $("seekFill").style.width = pct + "%";
  $("seekKnob").style.left = pct + "%";
  const ph = $("playhead");
  const trackW = $("lanes").clientWidth - 90;
  ph.style.left = (trackW * t / DUR) + "px";
  ph.dataset.t = fmt(t);
}

function renderAll() { renderLyrics(); renderTimeline(); renderInspector(); renderFrame(); bindClips(); }

/* --------- timeline interactions --------- */
function bindClips() {
  document.querySelectorAll(".clip").forEach(clip => {
    const id = +clip.dataset.id;
    clip.addEventListener("mousedown", e => {
      e.stopPropagation();
      state.activeId = id;
      const tp = state.telops.find(x => x.id === id);
      const handle = e.target.dataset?.h || "move";
      const track = clip.parentElement;
      const pxPerSec = track.clientWidth / DUR;
      const start = { x: e.clientX, tIn: tp.tIn, tFo: tp.tFo, tEnd: tp.tEnd };
      renderInspector();
      const onMove = ev => {
        const ds = (ev.clientX - start.x) / pxPerSec;
        if (handle === "move") {
          const len = start.tEnd - start.tIn;
          tp.tIn = clamp(start.tIn + ds, 0, DUR - len);
          tp.tFo = tp.tIn + (start.tFo - start.tIn);
          tp.tEnd = tp.tIn + len;
        } else if (handle === "in") {
          tp.tIn = clamp(start.tIn + ds, 0, tp.tFo - 0.2);
        } else if (handle === "fo") {
          tp.tFo = clamp(start.tFo + ds, tp.tIn + 0.1, tp.tEnd);
        } else if (handle === "end") {
          tp.tEnd = clamp(start.tEnd + ds, tp.tIn + 0.5, DUR);
          tp.tFo = Math.min(tp.tFo, tp.tEnd);
        }
        // live update: reposition this clip only (cheap), full re-render on mouseup
        const l = tp.tIn / DUR * 100, w = (tp.tEnd - tp.tIn) / DUR * 100;
        clip.style.left = l + "%"; clip.style.width = w + "%";
        const foPct = clamp((tp.tFo - tp.tIn) / (tp.tEnd - tp.tIn) * 100, 0, 100);
        clip.querySelector(".fadezone").style.width = (100 - foPct) + "%";
        clip.querySelector(".h.fo").style.left = `calc(${foPct}% - 7px)`;
        renderInspector(); renderFrame();
      };
      const onUp = () => {
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
        renderAll();
      };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}

// seek by clicking ruler / seek bar
function seekFromEvent(e, el) {
  const r = el.getBoundingClientRect();
  state.t = clamp((e.clientX - r.left) / r.width, 0, 1) * DUR;
  renderFrame();
}
function makeScrubbable(el) {
  el.addEventListener("mousedown", e => {
    seekFromEvent(e, el);
    const mv = ev => seekFromEvent(ev, el);
    const up = () => { document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); };
    document.addEventListener("mousemove", mv);
    document.addEventListener("mouseup", up);
  });
}
makeScrubbable($("ruler"));
makeScrubbable($("seek"));

// click empty lane area = deselect
$("lanes").addEventListener("mousedown", e => {
  if (e.target.closest(".clip")) return;
  state.activeId = null;
  renderAll();
});

/* --------- buttons / keys --------- */
$("btnPlay").onclick = () => setPlaying(!state.playing);
$("btnPrev").onclick = () => { state.t = 0; renderFrame(); };
$("btnNext").onclick = () => { state.t = DUR; setPlaying(false); renderFrame(); };
$("btnInsert").onclick = insertTelop;
$("btnFadeOut").onclick = setFadeOutHere;
$("btnDelete").onclick = deleteActive;

document.addEventListener("keydown", e => {
  if (e.target.matches("textarea, input, select")) return;
  if (e.code === "Space") { e.preventDefault(); setPlaying(!state.playing); }
  else if (e.key === "i" || e.key === "I") insertTelop();
  else if (e.key === "o" || e.key === "O") setFadeOutHere();
  else if (e.key === "ArrowLeft")  { state.t = clamp(state.t - 1, 0, DUR); renderFrame(); }
  else if (e.key === "ArrowRight") { state.t = clamp(state.t + 1, 0, DUR); renderFrame(); }
  else if (e.key === "Delete" || e.key === "Backspace") deleteActive();
});

window.addEventListener("resize", renderFrame);

/* --------- demo data: a couple of pre-placed telops --------- */
state.telops.push(
  { id: ++state.seq, text: LYRICS[0], tIn: 8,  tFo: 13.5, tEnd: 14.3 },
  { id: ++state.seq, text: LYRICS[1], tIn: 16, tFo: 21,   tEnd: 21.8 },
);
state.nextLyric = 2;
state.t = 24;
renderAll();
toast("Space で再生、I でテロップ挿入を試せます");
</script>
</body>
</html>
